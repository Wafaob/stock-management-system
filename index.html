<!DOCTYPE html>

<html lang="fr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MiniStock | Gestionnaire de stock</title>

</head>

<body>



<header>

<h1>MiniStock</h1>

<p>Une application simple permettant d'organiser et de suivre les produits en stock.</p>

</header>



<main>

    <section>

        <h2>Ajouter un produit</h2>

    <form id="product-form">

        <label for="product-name">Nom du produit</label>
        <input type="text" id="product-name" name="product-name" required>

        <label for="product-category">Catégorie</label>
<select id="product-category" name="product-category" required>
    <option value="" disabled selected>Choisir une catégorie</option>
    <option value="alimentation">Alimentation</option>
    <option value="hygiene">Hygiène</option>
    <option value="maison">Maison</option>
    <option value="electronique">Électronique</option>
    <option value="autre">Autre</option>
</select>


        <label for="product-quantity">Quantité</label>
        <input type="number" id="product-quantity" name="product-quantity" min="0" required>

        <label for="product-threshold">Seuil d’alerte</label>
        <input type="number" id="product-threshold" name="product-threshold" min="0" value="5" required>

        <button type="submit">Ajouter le produit</button>

    </form>

    </section>

    <section>
        <h2>Rechercher et filtrer</h2>
        <label for="product-search">Rechercher un produit</label>
        <input type="search" id="product-search" name="product-search" placeholder="Rechercher par nom...">

        <label for="category-filter">Filtrer par catégorie</label>
        <select id="category-filter" name="category-filter">
            <option value="all">Toutes les catégories</option>
            <option value="alimentation">Alimentation</option>
            <option value="hygiene">Hygiène</option>
            <option value="maison">Maison</option>
            <option value="electronique">Électronique</option>
            <option value="autre">Autre</option>

        </select>

    </section>

    <section><h2>Produits en stock</h2>
    <table>
        <thead>
            <tr>
                <th>Produit</th>
                <th>Catégorie</th>
                <th>Quantité</th>
                <th>État du stock</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody id="product-list"> 
        </tbody>
        

    </table>
<p id="empty-message">Aucun produit en stock.</p>
</section>
</main>



<footer><p>Créé par Wafae — 2026</p></footer>



</body>

</html>
